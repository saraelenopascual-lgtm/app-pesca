{% extends 'base.html' %}

{% block content %}
  <h2>Recuperar contraseña</h2>

  <div class="card">
    <div class="card-body">
      <form method="post" class="form">
        <div class="form-row">
          <label>Email</label>
          <input type="email" name="email" required />
        </div>

        <div class="form-actions">
          <button class="btn btn-primary">Enviar enlace de restablecimiento</button>
          <a class="btn btn-secondary" href="{{ url_for('main.login') }}">Volver al login</a>
        </div>
      </form>

      {% if reset_link %}
        <div class="alert alert-info" style="margin-top: 1rem;">
          <strong>Enlace de restablecimiento:</strong><br />
          <a href="{{ reset_link }}">{{ reset_link }}</a><br />
          (Puedes copiarlo y pegarlo en tu navegador.)
        </div>
      {% endif %}
    </div>
  </div>
{% endblock %}
